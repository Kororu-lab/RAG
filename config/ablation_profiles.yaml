defaults:
  retrieval:
    dynamic_scaling: false
    fixed_k: 30
    fixed_top_n: 15
    l0_only: true
    enable_language_filter: false
    viking_use_detected_language: false
    recursive_retrieval: false
    vision_search: false
    hybrid_search:
      enabled: false
    viking:
      enabled: false
      mode: soft
      max_expansions: 2
      min_hits: 3
  reranker:
    enabled: true
  ablation:
    enabled: true
    force_deterministic: true
    reranker_policy: follow_profile
    required_backend_mode: postgres
    profile_timeout_sec: 600

profiles:
  E0:
    description: "Baseline simple RAG: vector-only, L0-only, no BM25, no Viking, no language filter, no recursive."

  E1:
    description: "E0 + BM25 hybrid."
    retrieval:
      hybrid_search:
        enabled: true

  E2:
    description: "E0 + RAPTOR (L1 retrieval + recursive L1->L0 expansion)."
    retrieval:
      l0_only: false
      recursive_retrieval: true

  E3:
    description: "E0 + Viking soft, language-agnostic (no SQL lang filter, no Viking language seed)."
    retrieval:
      viking:
        enabled: true
        mode: soft
      enable_language_filter: false
      viking_use_detected_language: false

  E4:
    description: "E3 + language filter (and Viking language seed enabled)."
    retrieval:
      viking:
        enabled: true
        mode: soft
      enable_language_filter: true
      viking_use_detected_language: true

  E5:
    description: "All mixed: BM25 + RAPTOR + Viking soft + language filter."
    retrieval:
      l0_only: false
      recursive_retrieval: true
      hybrid_search:
        enabled: true
      viking:
        enabled: true
        mode: soft
      enable_language_filter: true
      viking_use_detected_language: true
