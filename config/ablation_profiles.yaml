defaults:
  retrieval:
    dynamic_scaling: false
    fixed_k: 30
    fixed_top_n: 30
    l0_only: true
    enable_language_filter: false
    viking_use_detected_language: false
    recursive_retrieval: false
    sibling_expansion: false
    vision_search: false
    query_split:
      enabled: false
      max_languages: 3
      branch_k_mode: balanced
    hybrid_search:
      enabled: false
    viking:
      enabled: false
      mode: soft
      max_expansions: 2
      min_hits: 3
  reranker:
    enabled: false
    top_n: 30
  ablation:
    enabled: true
    force_deterministic: true
    reranker_policy: follow_profile
    required_backend_mode: postgres
    profile_timeout_sec: 600
    run_mode: retrieval
  rag:
    skip_grading: true
    skip_hallucination: true

profiles:
  B0:
    description: "Dense only baseline (vector-only, L0-only, no BM25, no Viking, no lang filter, no recursive)."

  B1:
    description: "B0 + BM25 hybrid."
    retrieval:
      hybrid_search:
        enabled: true

  B2:
    description: "B1 + RAPTOR recursive (L1 retrieval + L1->L0 expansion)."
    retrieval:
      l0_only: false
      recursive_retrieval: true
      hybrid_search:
        enabled: true

  B3:
    description: "B2 + Viking soft (language-agnostic; no language filter, no Viking language seed)."
    retrieval:
      l0_only: false
      recursive_retrieval: true
      hybrid_search:
        enabled: true
      viking:
        enabled: true
        mode: soft
      enable_language_filter: false
      viking_use_detected_language: false

  B4:
    description: "B3 + language filter (and Viking language seed enabled)."
    retrieval:
      l0_only: false
      recursive_retrieval: true
      hybrid_search:
        enabled: true
      viking:
        enabled: true
        mode: soft
      enable_language_filter: true
      viking_use_detected_language: true

  B5:
    description: "B4 + split-query retrieval for multi-language queries."
    retrieval:
      l0_only: false
      recursive_retrieval: true
      hybrid_search:
        enabled: true
      viking:
        enabled: true
        mode: soft
      enable_language_filter: true
      viking_use_detected_language: true
      query_split:
        enabled: true
        max_languages: 3
        branch_k_mode: balanced

  B6:
    description: "B5 + reranker."
    retrieval:
      l0_only: false
      recursive_retrieval: true
      hybrid_search:
        enabled: true
      viking:
        enabled: true
        mode: soft
      enable_language_filter: true
      viking_use_detected_language: true
      query_split:
        enabled: true
        max_languages: 3
        branch_k_mode: balanced
      fixed_top_n: 30
    reranker:
      enabled: true
      top_n: 30

  B7:
    description: "B6 + LangGraph E2E loop (grade/rewrite/hallucination)."
    retrieval:
      l0_only: false
      recursive_retrieval: true
      hybrid_search:
        enabled: true
      viking:
        enabled: true
        mode: soft
      enable_language_filter: true
      viking_use_detected_language: true
      query_split:
        enabled: true
        max_languages: 3
        branch_k_mode: balanced
      fixed_top_n: 30
    reranker:
      enabled: true
      top_n: 30
    rag:
      skip_grading: false
      skip_hallucination: false
    ablation:
      run_mode: e2e
