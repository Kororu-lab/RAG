project:
  name: "ltdb_rag"
  data_path: "./data/ltdb"
  db_path: "./data/chroma_db"

ingest:
  l0:
    min_content_chars: 10
    allow_short_stub: false

### LLM Configuration Examples ###
# 1. OpenAI (GPT-4)
#   provider: "openai"
#   model_name: "gpt-4-turbo"
#   api_key_env: "OPENAI_API_KEY"
#
# 2. Anthropic (Claude 3)
#   provider: "anthropic"
#   model_name: "claude-3-opus-20240229"
#   api_key_env: "ANTHROPIC_API_KEY"
#
# 3. DeepSeek (via OpenAI Compatible API)
#   provider: "deepseek"
#   model_name: "deepseek-chat"
#   base_url: "https://api.deepseek.com"
#   api_key_env: "DEEPSEEK_API_KEY"

llm_ingestion:
  provider: "ollama"
  model_name: "gpt-oss:120b"
  base_url: "http://localhost:11434"
  temperature: 0.1
  num_ctx: 8192
  api_key_env: "" # Environment variable for API Key (e.g. OPENAI_API_KEY). Leave blank for Ollama.

llm_retrieval:
  provider: "ollama"
  model_name: "gpt-oss:20b"
  base_url: "http://localhost:11434"
  temperature: 0.1
  num_ctx: 8192
  request_timeout_sec: 600
  lang_detect_retries: 2
  lang_detect_backoff_sec: 0.5
  lang_detect_candidate_k: 12
  lang_detect_card_chars: 220
  lang_detect_global_card_chars: 90
  lang_json_retries: 1
  lang_json_backoff_sec: 0.25
  api_key_env: "" # Environment variable for API Key (e.g. OPENAI_API_KEY). Leave blank for Ollama.

rag:
  generation_timeout_sec: 600
  grounding_mode: "strict_extractive"       # strict_extractive | balanced
  answer_format_style: "concise_bullets"  # fluent_with_table | concise_bullets
  explanatory_concise_style_enabled: true   # rollback: false restores the older list-heavy concise generation prompt
  comparison_table_preference_enabled: true  # rollback: false keeps explanatory style but removes the prompt preference for an optional small comparison table
  strict_relevance_judge_enabled: true      # rollback: false restores the older permissive relevance gate
  branch_local_grading_enabled: true        # rollback: false grades all docs against the original merged question only
  keep_maybe_docs_in_grading: true          # rollback: false drops borderline docs instead of carrying them forward
  original_evidence_generation_enabled: true
  surface_example_spans_in_context: true    # rollback: false removes the structured original-example hints
  whole_doc_on_multi_relevant_enabled: true # rollback: false disables whole-doc evidence expansion
  whole_doc_min_relevant_chunks: 1          # rollback: set back to 2 for the older behavior
  require_inline_citations: true
  grounding_min_citation_coverage: 0.35
  claim_count_fail_closed_min_coverage: 0.80  # rollback: set to 1.0 to make claim-count overflow fail-closed more aggressively
  fail_closed_on_guard: true                # rollback: false restores warning-only pass-through on guard failure
  readable_fail_closed_response_enabled: true # rollback: false restores the old raw evidence dump fallback
  enforce_korean_output_for_korean_query: true  # rollback: false disables the Korean-output hard guard
  minimum_hangul_ratio: 0.10
  hallucination_mode: "two_stage"           # two_stage | legacy
  hallucination_ambiguous_policy: "pass_with_warning"  # pass_with_warning | rewrite
  skip_checker_on_stage1_pass: true
  skip_rewrite_on_stable_retrieval: true
  allow_stable_pass_on_catastrophic_guard_fail: false  # rollback: true restores the older stable-pass behavior
  stable_retrieval_jaccard_threshold: 0.9
  max_claims_per_answer: 12
  missing_info_phrase: "정보가 부족합니다"

embedding:
  model_name: "BAAI/bge-m3"
  device: "auto" # auto prefers cuda, then mps, then cpu; explicit values: cuda/mps/cpu with fallback
  normalize_embeddings: true

vision:
  device: "auto"                # auto|cuda|mps|cpu
  mps_fallback_to_cpu: true     # fallback to CPU for ColPali stability
  ingest_store_dtype: "float32" # float32|float16|bfloat16

retrieval:
  search_type: "similarity" # or "mmr"
  k: 30 # Initial retrieval count
  dynamic_scaling: true      # Query-dependent k/top_n scaling
  fixed_k: 30               # Used when dynamic_scaling=false
  fixed_top_n: 15           # Used when dynamic_scaling=false
  l0_only: false            # Restrict retrieval to metadata.level=0 only
  enable_language_filter: true
  viking_use_detected_language: true
  recursive_retrieval: true  # Expand L1 summaries to L0 chunks
  sibling_expansion: false   # Keep OFF by default for fair ablations
  topic_scope_original_rescue_enabled: true   # rollback: false disables direct original-content rescue for poisoned summary rows
  topic_scope_original_rescue_max_docs: 8     # rollback: lower or disable if rescue proves too broad
  vision_search: false       # ColPali vision search for tables/images
  query_split:
    enabled: true
    max_languages: 3
    branch_k_mode: "full_per_branch" # balanced | full_per_branch
  hybrid_search:
    enabled: true
    mode: "dense_bm25_union"
    union_bm25_overfetch: 10
    index_path: "data/bm25_index.pkl"
  viking:
    enabled: false        # OpenViking-style hierarchy routing (restricts search space)
    mode: "soft"          # "soft" = widen scope on low hits; "strict" = no fallback
    max_expansions: 2     # Max widening steps in soft mode (phenomena→category→lang→all)
    min_hits: 3           # Minimum vector results before triggering soft fallback
    lexicon_path: "config/viking_lexicon.yaml"  # External lexicon file (term→taxonomy mappings)

reranker:
  enabled: true
  model_name: "BAAI/bge-reranker-v2-m3"
  top_n: 30
  pre_rerank_cap: 300
  max_input_chars: 4000

ablation:
  enabled: false
  force_deterministic: false
  reranker_policy: "follow_profile"     # force_on|force_off|follow_profile
  required_backend_mode: "postgres"     # postgres|local_jsonl|any

database:
  type: "postgres"
  host: "localhost"
  port: 5432
  user: "user"
  password: "password" # Change this to your Postgres password
  dbname: "ltdb_rag"
  table_name: "linguistics_raptor"
